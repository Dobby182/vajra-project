<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Vajra Naturals</title>

  <link rel="icon" type="image/png" sizes="32x32" href="images/vajralogo.png">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;600&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/stylelogin.css">
</head>
<body>

  <div class="top-banner">Get extra 10% off on your first order</div>

  <header>
    <nav class="navbar">
      <div class="navbar-left">
        <h1 class="playfair-font">vajra</h1>
        <div class="nav-links">
          <a href="index.html">HOME</a>
          <div class="dropdown">
            <a href="#">CATEGORIES</a>
            <div class="dropdown-content">
              <a href="hair.html">HAIR</a>
              <a href="skin.html">SKIN</a>
              <a href="food.html">FOOD</a>
            </div>
          </div>
          <a href="reviews.html">REVIEWS</a>
          <a href="contact.html">CONTACT</a>
        </div>
      </div>

      <div class="navbar-right-group">
        <form class="search-bar" onsubmit="return false;">
          <i class="fa fa-search"></i>
          <input type="text" placeholder="Search..." />
        </form>

        <div class="navbar-icons">
          <a href="#"><i class="far fa-heart"></i></a>
          <a href="#"><i class="fas fa-shopping-cart"></i></a>
          <a href="login.html"><i class="far fa-user-circle"></i></a>
        </div>
      </div>
    </nav>
  </header>

  <section class="login-container">
    <div class="login-box">
      <h2 class="playfair-font">Login</h2>
      <form id="loginForm">
        <input id="email" type="email" name="email" placeholder="Email" required />
        <input id="password" type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <div class="login-links">
        <a href="register.html">New user? Register here</a>
        <a href="forgot.html">Forgot password?</a>
      </div>
      <p id="loginMsg" style="color:#b22222;"></p>
    </div>
  </section>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/profile.html';
      } else {
        document.getElementById('loginMsg').textContent = data.message || 'Login failed';
      }
    });
  </script>

</body>
</html>
